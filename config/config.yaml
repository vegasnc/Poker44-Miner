model:
  type: "stacked_ensemble"
  lgbm_params:
    objective: "binary"
    metric: "auc"
    boosting_type: "gbdt"
    num_leaves: 31
    max_depth: 6
    learning_rate: 0.03
    feature_fraction: 0.75
    bagging_fraction: 0.85
    bagging_freq: 5
    min_child_samples: 10
    min_data_in_leaf: 10
    min_data_in_bin: 3
    lambda_l1: 0.1
    lambda_l2: 2.0
    verbose: -1
    n_estimators: 600
    early_stopping_rounds: 50
  xgb_params:
    n_estimators: 400
    max_depth: 5
    learning_rate: 0.03
    subsample: 0.85
    colsample_bytree: 0.75
    min_child_weight: 5
    reg_alpha: 0.1
    reg_lambda: 2.0
    early_stopping_rounds: 50
  catboost_params:
    iterations: 400
    depth: 6
    learning_rate: 0.05
    l2_leaf_reg: 3.0
    border_count: 64
    random_strength: 1.0
    bagging_temperature: 0.5
    early_stopping_rounds: 50
  set_transformer_params:
    hidden_dim: 32
    num_heads: 4
    num_sab: 2
    dropout: 0.4
    lr: 0.003
    epochs: 80
    batch_size: 32
    patience: 15
  ensemble:
    n_folds: 5
    calibrator_blend: 0.7
    human_weight: 2.0
    target_fpr: 0.04
    use_set_transformer: true

features:
  action_patterns: true
  bet_sizing: true
  aggression_metrics: true
  positional_play: true
  timing_patterns: false
  consistency_metrics: true
  statistical_features: true
  advanced_patterns: true
  per_hand_aggregation: true
  bot_tell_features: true
  advanced_tell_features: true
  gto_tell_features: true

training:
  test_size: 0.2
  validation_size: 0.2
  random_seed: 42
  cross_validation_folds: 5
  use_multiple_releases: true
  min_releases: 3

data:
  base_url: "https://api.poker44.net/api/v1/benchmark"
  cache_dir: "data/cache"
  max_chunks_per_day: 24
  start_date: "2026-05-26"
  end_date: "2026-06-24"

inference:
  batch_size: 10
  timeout_seconds: 30
  max_retries: 3
  model_path: "models/saved/model.joblib"
  feature_names_path: "models/saved/feature_names.json"
  fallback_score: 0.5
  prediction_threshold: 0.5
